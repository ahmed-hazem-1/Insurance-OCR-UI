name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          OCR_API_KEY: ${{ secrets.OCR_API_KEY || '' }}
          OCR_API_URL: ${{ secrets.OCR_API_URL || 'https://insurance-ocr-logic-756575203090.europe-west1.run.app/v1/documents/extract' }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'http://localhost:3000' }}

      - name: Check build output
        run: test -d dist && echo "Build successful" || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-node20
          path: dist/
          retention-days: 7
