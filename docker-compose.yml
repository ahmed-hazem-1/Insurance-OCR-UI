version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
        OCR_API_KEY: ${OCR_API_KEY:-}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OCR_API_KEY: ${OCR_API_KEY}
      VITE_APP_URL: ${VITE_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
